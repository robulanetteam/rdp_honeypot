version: "3.8"

# RDP Honeypot: единственный контейнер — самописный listener на :3389.
# Имитирует Windows Server 2008 R2 (X.224, TLS, NTLMSSP, FILETIME, AV_PAIRs).
#
# Деплой без зависимостей на хосте (systemd/python/iptables не нужны):
#   cp .env.example .env   # опционально
#   docker compose up -d

services:
  honeypot:
    build:
      context: .
      dockerfile: honeypot/Dockerfile
    container_name: rdp-honeypot
    hostname: WIN-SRV2008
    restart: unless-stopped
    ports:
      - "0.0.0.0:3389:3389"
    environment:
      TZ: ${TZ:-Europe/Moscow}
      HONEYPOT_COMPUTER: ${HONEYPOT_COMPUTER:-WIN-SRV2008}
      HONEYPOT_DOMAIN: ${HONEYPOT_DOMAIN:-CORP}
      HONEYPOT_DNS_COMPUTER: ${HONEYPOT_DNS_COMPUTER:-WIN-SRV2008.corp.local}
      HONEYPOT_DNS_DOMAIN: ${HONEYPOT_DNS_DOMAIN:-corp.local}
      HONEYPOT_FORCE_LEGACY: ${HONEYPOT_FORCE_LEGACY:-1}
      # Пути внутри контейнера — жёстко привязаны к volumes ниже
      HONEYPOT_LOG_DIR: /data/logs
      MIRROR_DIR: /data/public
      PUBLIC_LOG_NAME: ${PUBLIC_LOG_NAME:-rdp_honeypot.txt}
      PUBLIC_LOG_EVERY_N: ${PUBLIC_LOG_EVERY_N:-3}
      WINDOW_HOURS: ${WINDOW_HOURS:-24}
      PRIVATE_LOG: /data/private/credentials.log
    volumes:
      - ./data/logs:/data/logs          # JSONL события + cert
      - ./data/public:/data/public      # публичный лог (раздавать через nginx/caddy)
      - ./data/private:/data/private    # пароли/хэши (chmod 0700 на хосте)
      # Python-исходники монтируются поверх запечённых в образ файлов.
      # git pull + docker compose restart — достаточно для обновления кода
      # без пересборки образа. Пересборка нужна только при изменении
      # Dockerfile или requirements.txt.
      - ./honeypot/honeypot.py:/app/honeypot.py:ro
      - ./honeypot/rdp_protocol.py:/app/rdp_protocol.py:ro
      - ./honeypot/rdp_legacy.py:/app/rdp_legacy.py:ro
      - ./honeypot/ntlm.py:/app/ntlm.py:ro
      - ./honeypot/ts_signing_key.py:/app/ts_signing_key.py:ro
      - ./scripts/log_processor.py:/app/log_processor.py:ro
      - ./scripts/classifier.py:/app/classifier.py:ro
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
